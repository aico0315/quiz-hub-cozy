<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">

  <!-- 背景：ダスティモーブ（パープル寄りブラウン） -->
  <rect width="48" height="48" rx="10" fill="#9b7b8f"/>

  <!-- ブルーベリーの星（calyx）を2時の位置に：中心(33, 15) -->
  <!-- 5枚の花びら（回転で配置） -->
  <g stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <g transform="rotate(0, 33, 15)">
      <path d="M31.5 15 Q31 10.5 33 7.5 Q35 10.5 34.5 15"/>
    </g>
    <g transform="rotate(72, 33, 15)">
      <path d="M31.5 15 Q31 10.5 33 7.5 Q35 10.5 34.5 15"/>
    </g>
    <g transform="rotate(144, 33, 15)">
      <path d="M31.5 15 Q31 10.5 33 7.5 Q35 10.5 34.5 15"/>
    </g>
    <g transform="rotate(216, 33, 15)">
      <path d="M31.5 15 Q31 10.5 33 7.5 Q35 10.5 34.5 15"/>
    </g>
    <g transform="rotate(288, 33, 15)">
      <path d="M31.5 15 Q31 10.5 33 7.5 Q35 10.5 34.5 15"/>
    </g>

  </g>

  <!-- 中心の輪 -->
  <circle cx="33" cy="15" r="3.8"
          stroke="white" stroke-width="1.8" fill="none"/>

  <!-- 裂け目 -->
  <path d="M30.8 15 Q33 13 35.2 15 Q33 17 30.8 15Z"
        stroke="white" stroke-width="1.2" fill="none"/>

</svg>
