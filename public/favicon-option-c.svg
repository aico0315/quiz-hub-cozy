<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- 丸みのある正方形の背景（グラデーション） -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="14" fill="url(#grad)"/>
  <!-- 吹き出し風の丸 -->
  <circle cx="24" cy="21" r="13" fill="white" opacity="0.15"/>
  <!-- ? マーク -->
  <text x="24" y="29" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="white" text-anchor="middle">?</text>
  <!-- 点（ドット） -->
  <circle cx="24" cy="38" r="3" fill="white"/>
</svg>
